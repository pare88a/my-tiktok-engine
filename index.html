<!DOCTYPE html>
<html>
<head>
<title>TikTok Downloader</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:sans-serif;text-align:center;padding:40px;">

<h2>TikTok Downloader</h2>

<input id="url" placeholder="Paste TikTok link" style="width:80%;padding:10px;">
<br><br>

<button onclick="download()" style="padding:10px 20px;">Download</button>

<script>

async function download(){

let url=document.getElementById("url").value;

if(!url){
alert("Paste TikTok link");
return;
}

let res=await fetch("/api/download?url="+encodeURIComponent(url));
let data=await res.json();

if(data.error){
alert(data.error);
return;
}

window.open(data.download,"_blank");

}

</script>

</body>
</html>
